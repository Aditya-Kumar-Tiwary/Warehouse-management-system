<!DOCTYPE html>
<html>

<head>

    <title>Register Page</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f2f2f2;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
        }

        .container{
            background-color: white;
            padding: 30px;
            width: 300px;

            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2{
            text-align: center;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        button{
            width: 100%;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
        }

        p{
            text-align: center;
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>Register</h2>

        <form>

            <input 
                type="text"
                placeholder="Enter Name"
                required
            >

            <input 
                type="email"
                placeholder="Enter Email"
                required
            >

            <input 
                type="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Register
            </button>

        </form>

        <p>
            Already have account?
            <a href="login.html">Login</a>
        </p>

    </div>

</body>

</html>
